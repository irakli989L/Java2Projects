<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Item - OnlyMarketFans</title>
    <style>
        :root {
          --primary: #7c3aed;
          --bg: #f6f3ff;
        }

        body {
          margin: 0;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          background: var(--bg);
          padding: 40px;
        }

        .form-container {
          max-width: 520px;
          margin: 50px auto;
          background: white;
          padding: 35px;
          border-radius: 18px;
          box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        h2 {
          color: var(--primary);
          margin-top: 0;
          margin-bottom: 25px;
          font-weight: 600;
        }

        /* Styled labels so they don't break the layout */
        label {
          display: block;
          margin-top: 15px;
          margin-bottom: 5px;
          font-weight: 600;
          font-size: 14px;
          color: #514457;
          text-align: left;
        }

        input[type="text"], input[type="number"], input[type="file"], textarea {
          width: 100%;
          padding: 12px;
          margin: 5px 0 15px 0;
          border-radius: 10px;
          border: 1px solid #ddd;
          outline: none;
          box-sizing: border-box;
          font-family: inherit;
          background: #fdfbfe;
          transition: border-color 0.2s, background-color 0.2s;
        }

        input:focus, textarea:focus {
          border-color: var(--primary);
          background: #fff;
        }

        textarea {
          height: 120px;
          resize: none;
        }

        /* File input specific subtle styling */
        input[type="file"] {
          background: white;
          padding: 10px;
          cursor: pointer;
        }

        button {
          width: 100%;
          padding: 14px;
          background: var(--primary);
          color: white;
          border: none;
          border-radius: 999px;
          font-weight: 600;
          font-size: 16px;
          cursor: pointer;
          margin-top: 15px;
          transition: all 0.2s;
          box-shadow: 0 4px 12px rgba(124, 58, 237, 0.2);
        }

        button:hover {
          transform: scale(1.01);
          background: #6d28d9;
        }

        .footer-link {
          text-align: center;
          margin-top: 20px;
          font-size: 14px;
        }

        .footer-link a {
          color: var(--primary);
          text-decoration: none;
          font-weight: 600;
        }

        .footer-link a:hover {
          text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Add New Item</h2>
    <form id="form">
        <label for="name">Item Name</label>
        <input type="text" name="name" id="name" placeholder="Enter item name" required>

        <label for="price">Price ($)</label>
        <input type="number" name="price" id="price" step="0.01" placeholder="0.00" required>

        <label for="file">Upload Item Image</label>
        <input type="file" id="file" accept="image/*" required>

        <label for="description">Description</label>
        <textarea name="description" id="description" placeholder="Describe your listing details..." required></textarea>

        <button type="submit">Publish</button>
    </form>
    <div class="footer-link"><a href="index.html">Cancel</a></div>
</div>

<script>
    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();

      const fileInput = document.getElementById("file");
      if (fileInput.files.length === 0) {
          alert("Please select an image file to upload.");
          return;
      }

      const formData = new FormData();
      formData.append("name", document.getElementById("name").value);
      formData.append("price", document.getElementById("price").value);
      formData.append("description", document.getElementById("description").value);
      formData.append("file", fileInput.files[0]);

      const res = await fetch("/api/items", {
        method: "POST",
        body: formData
      });

      if (res.ok) {
          window.location.href = "index.html";
      } else {
          const textErr = await res.text();
          alert("Error: " + textErr);
      }
    });
</script>
</body>
</html>
