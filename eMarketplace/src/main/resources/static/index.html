<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OnlyMarketFans</title>

    <style>
        :root{
          --primary:#7c3aed;
          --secondary:#facc15;
          --bg:#f6f3ff;
          --card:#ffffff;
          --text:#1f1b24;
        }

        body{
          margin:0;
          font-family: system-ui, Arial;
          background:var(--bg);
          color:var(--text);
        }

        header{
          display:flex;
          justify-content:space-between;
          align-items:center;
          padding:25px 40px;
        }

        h1{
          margin:0;
          color:var(--primary);
          font-size:28px;
          letter-spacing:-0.5px;
        }

        .add-btn{
          background:var(--primary);
          color:white;
          padding:10px 18px;
          border-radius:999px;
          text-decoration:none;
          font-weight:600;
          transition:0.2s;
        }

        .add-btn:hover{
          transform:scale(1.05);
          background:#6d28d9;
        }

        .grid{
          display:grid;
          grid-template-columns:repeat(3,1fr);
          gap:22px;
          padding:20px 40px;
        }

        .card{
          background:var(--card);
          border-radius:18px;
          overflow:hidden;
          box-shadow:0 10px 30px rgba(0,0,0,0.08);
          transition:0.25s;
        }

        .card:hover{
          transform:translateY(-6px);
          box-shadow:0 18px 40px rgba(124,58,237,0.18);
        }

        .card img{
          width:100%;
          height:220px;
          object-fit:cover;
        }

        .card-body{
          padding:15px;
        }

        .card h3{
          margin:0;
          font-size:18px;
        }

        .card a{
          text-decoration:none;
          color:var(--text);
        }

        .card a:hover{
          color:var(--primary);
        }

        .price{
          margin-top:8px;
          font-weight:700;
          color:var(--primary);
          font-size:18px;
        }

        .pagination{
          display:flex;
          justify-content:center;
          align-items:center;
          gap:12px;
          padding:25px;
        }

        button{
          border:2px solid var(--primary);
          background:white;
          color:var(--primary);
          padding:8px 14px;
          border-radius:999px;
          cursor:pointer;
          font-weight:600;
          transition:0.2s;
        }

        button:hover:not(:disabled){
          background:var(--primary);
          color:white;
        }

        button:disabled{
          opacity:0.4;
          cursor:not-allowed;
        }

        /* mobile */
        @media(max-width:900px){
          .grid{grid-template-columns:repeat(2,1fr);}
        }

        @media(max-width:600px){
          .grid{grid-template-columns:1fr;}
          header{padding:20px;}
        }
    </style>
</head>

<body>

<header>
    <h1>OnlyMarketFans</h1>
    <a class="add-btn" href="new-item.html">NEW</a>
</header>

<div id="grid" class="grid"></div>

<div class="pagination">
    <button id="prev">Prev</button>
    <span id="pageLabel">1</span>
    <button id="next">Next</button>
</div>

<script>
    let page = 0;

    function load(){
      fetch(`/items?page=${page}`)
        .then(r=>r.json())
        .then(data=>{
          const grid=document.getElementById("grid");
          grid.innerHTML="";

          data.content.forEach(i=>{
            grid.innerHTML += `
              <div class="card">
                <img src="${i.photoUrl || 'https://via.placeholder.com/400'}">
                <div class="card-body">
                  <a href="item.html?id=${i.id}">
                    <h3>${i.name}</h3>
                  </a>
                  <div class="price">$${Number(i.price).toFixed(2)}</div>
                </div>
              </div>
            `;
          });

          document.getElementById("pageLabel").innerText = page+1;
          document.getElementById("prev").disabled = page===0;
          document.getElementById("next").disabled = data.last;
        });
    }

    document.getElementById("prev").onclick=()=>{page--;load();}
    document.getElementById("next").onclick=()=>{page++;load();}

    load();
</script>

</body>
</html>
