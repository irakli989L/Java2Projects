<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OnlyMarketFans</title>

    <style>
        :root{
          --primary:#7c3aed;
          --bg:#f6f3ff;
        }

        body{
          margin:0;
          font-family:system-ui;
          background:var(--bg);
        }

        .container{
          max-width:750px;
          margin:40px auto;
          background:white;
          border-radius:18px;
          overflow:hidden;
          box-shadow:0 20px 50px rgba(0,0,0,0.1);
        }

        .back{
          display:inline-block;
          margin:20px;
          color:var(--primary);
          text-decoration:none;
          font-weight:600;
        }

        img{
          width:100%;
          height:420px;
          object-fit:cover;
        }

        .content{
          padding:25px;
        }

        h1{
          margin:0;
          color:var(--primary);
        }

        .price{
          font-size:26px;
          font-weight:700;
          margin:10px 0;
          color:var(--primary);
        }

        .desc{
          margin-top:15px;
          line-height:1.6;
          color:#333;
        }

        .time{
          color:#777;
          font-size:13px;
        }
    </style>
</head>

<body>

<div class="container">
    <a class="back" href="index.html">← Back</a>

    <img id="img">
    <div class="content">
        <h1 id="name"></h1>
        <div class="price" id="price"></div>
        <div class="time" id="time"></div>
        <p class="desc" id="desc"></p>
    </div>
</div>

<script>
    const id=new URLSearchParams(location.search).get("id");

    fetch(`/items/${id}`)
    .then(r=>r.json())
    .then(i=>{
      document.getElementById("name").innerText=i.name;
      document.getElementById("img").src=i.photoUrl;
      document.getElementById("price").innerText="$"+Number(i.price).toFixed(2);
      document.getElementById("desc").innerText=i.description;
      document.getElementById("time").innerText=new Date(i.submissionTime).toLocaleString();
    });
</script>

</body>
</html>
