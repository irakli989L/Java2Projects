<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>AnonBook</title>

  <style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        font-family:Arial,sans-serif;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#3949ab,#5c6bc0);
    }

    .card{
        background:white;
        padding:50px;
        width:450px;
        border-radius:20px;
        text-align:center;
        box-shadow:0 10px 25px rgba(0,0,0,.2);
    }

    h1{
        color:#3949ab;
        margin-bottom:15px;
        font-size:48px;
        letter-spacing:3px;
    }

    p{
        color:#666;
        margin-bottom:35px;
    }

    .btn{
        display:block;
        text-decoration:none;
        padding:15px;
        margin:15px 0;
        border-radius:10px;
        font-size:18px;
        font-weight:bold;
        transition:.2s;
    }

    .create{
        background:#3949ab;
        color:white;
    }

    .posts{
        background:#eceff1;
        color:#333;
    }

    .btn:hover{
        transform:translateY(-2px);
    }
  </style>
</head>
<body>

<div class="card">

  <h1>ANONBOOK</h1>

  <p>
    Share your thoughts anonymously.
  </p>

  <a href="/post/create" class="btn create">
    Create New Post
  </a>

  <a href="/post" class="btn posts">
    View All Posts
  </a>

</div>

</body>
</html>
