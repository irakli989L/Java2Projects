<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>AnonBook Post</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f6fb;
        }

        .header {
            background: #3949ab;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 3px;
        }

        .container {
            width: 900px;
            margin: 30px auto;
        }

        .post-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 10px rgba(0,0,0,.08);
        }

        .post-image {
            width: 400px;
            margin-top: 15px;
            border-radius: 10px;
        }

        .comments-title {
            margin-top: 30px;
            margin-bottom: 15px;
            font-size: 22px;
        }

        .comment {
            background: white;
            margin-bottom: 10px;
            padding: 12px;
            border-left: 4px solid #3949ab;
            border-radius: 6px;
        }

        .comment-form {
            display: flex;
            margin-top: 20px;
        }

        .comment-form input[type=text] {
            flex: 1;
            padding: 12px;
        }

        .comment-form button {
            width: 120px;
            border: none;
            background: #3949ab;
            color: white;
            cursor: pointer;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 15px;
            background: #3949ab;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .back-btn:hover {
            background: #303f9f;
        }
    </style>
</head>
<a href="/post" class="back-btn">← Back to Posts</a>
<body>

<div class="header">
    ANONBOOK
</div>

<div class="container">

    <div class="post-card">

        <p th:text="${post.content}"></p>

        <img class="post-image"
             th:if="${post.imageUrl != null}"
             th:src="${post.imageUrl}">

    </div>

    <h2 class="comments-title">
        Comments
    </h2>

    <div th:each="comment : ${comments}" class="comment">

        <div th:text="${comment.content}"></div>

        <small
                th:text="${#temporals.format(comment.createdAt, 'dd.MM.yyyy HH:mm')}">
        </small>

    </div>

    <form class="comment-form"
          action="/comment"
          method="post">

        <input type="hidden"
               name="postId"
               th:value="${post.id}">

        <input type="text"
               name="content"
               placeholder="Write a comment..."
               required>

        <button type="submit">
            Add
        </button>

    </form>

</div>

</body>
</html>
