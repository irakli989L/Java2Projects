<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messenger</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }

        h2 {
            margin-bottom: 10px;
        }

        .row {
            display: flex;
            gap: 20px;
        }

        .box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            flex: 1;
        }

        .full {
            margin-top: 20px;
        }

        label {
            font-size: 14px;
            display: block;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #3e63b3;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #45a049;
        }

        #messages {
            margin-top: 15px;
            padding: 10px;
            background: #fafafa;
            border-radius: 5px;
            min-height: 50px;
        }

        .msg {
            padding: 5px 0;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>

<body>

<div class="row">
    <div class="box">
        <h2>Send Message</h2>

        <label>Target user:</label>
        <input id="msgUsername">

        <label>Message:</label>
        <input id="msgText">

        <button onclick="sendMessage()">Send</button>
    </div>

    <div class="box">
        <h2>Register User</h2>

        <label>Username:</label>
        <input id="regUsername">

        <label>Password:</label>
        <input id="regPassword" type="password">

        <button onclick="register()">Register</button>
    </div>
</div>

<div class="box full">
    <h2>Inbox</h2>

    <label>Username:</label>
    <input id="readUsername">

    <label>Password:</label>
    <input id="readPassword" type="password">

    <button onclick="readMessages()">Check Inbox</button>

    <div id="messages"></div>
</div>

<script>
    const BASE_URL = "";

    function register() {
        const username = regUsername.value;
        const password = regPassword.value;

        fetch(BASE_URL + "/user", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({username, password})
        })
        .then(res => {
            console.log("STATUS:", res.status);

            if (res.status === 201) {
                alert("Registered successfully");
                regUsername.value = "";
                regPassword.value = "";
            } else if (res.status === 409) {
                alert("Username already exists");
            } else if (res.status === 422) {
                alert("Fill all fields");
            } else {
                alert("Unexpected error: " + res.status);
            }
        });
    }

    function sendMessage() {
        const username = msgUsername.value;
        const message = msgText.value;

        fetch(BASE_URL + "/message", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                receiver: username,
                message: message
            })
        })
        .then(res => {
            if (res.status === 201) {
                alert("Message sent");
                msgUsername.value = "";
                msgText.value = "";
            } else if (res.status === 404) {
                alert("User not found");
            } else if (res.status === 422) {
                alert("Fill all fields");
            }
        });
    }

    function readMessages() {
        const username = readUsername.value;
        const password = readPassword.value;

        fetch(`/message?username=${username}&password=${password}`)
            .then(res => {
                console.log("STATUS:", res.status);

                if (res.status === 200) return res.json();
                if (res.status === 404) {
                    alert("Invalid credentials");
                    return null;
                }
            })
            .then(data => {
                if (!data) return;

                const container = document.getElementById("messages");
                container.innerHTML = "";

                if (data.length === 0) {
                    container.innerHTML = "No messages";
                    return;
                }

                data.forEach(msg => {
                    const div = document.createElement("div");
                    div.textContent = "• " + msg.message;
                    container.appendChild(div);
                });
            });
    }
</script>

</body>
</html>
